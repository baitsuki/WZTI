<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WZTI性格测试 | 王者荣耀世界</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    :root {
      --wz-main: #1a1d26;
      --wz-line: #4e5666;
      --wz-accent: #5886ff;
      --wz-light: #f5f7fa;
      --radius: 16px;
    }
    body {
      background: #fff;
      color: var(--wz-main);
      min-height: 100vh;
    }
    .page {
      display: none;
      padding: 24px 16px;
      max-width: 700px;
      margin: 0 auto;
    }
    .page.active {
      display: block;
    }
    /* 封面页 - 极简扁平线稿风 */
    .cover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      text-align: center;
    }
    .cover-logo {
      width: 120px;
      height: 120px;
      border: 2.5px solid var(--wz-line);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--wz-line);
      font-weight: bold;
      font-size: 18px;
    }
    .cover-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--wz-main);
      line-height: 1.2;
    }
    .btn {
      padding: 14px 32px;
      border: 2px solid var(--wz-accent);
      background: #fff;
      color: var(--wz-accent);
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover {
      background: var(--wz-accent);
      color: #fff;
    }
    /* 答题页 */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .progress {
      height: 6px;
      background: var(--wz-light);
      border-radius: 99px;
      flex: 1;
      margin: 0 12px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--wz-accent);
      width: 0%;
      transition: 0.3s;
    }
    .nav-btn {
      background: none;
      border: 1px solid var(--wz-line);
      color: var(--wz-line);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .question {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .option {
      border: 1.5px solid var(--wz-line);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 15px;
    }
    .option:hover {
      border-color: var(--wz-accent);
      color: var(--wz-accent);
    }
    /* 结果页 */
    .result {
      text-align: center;
    }
    .result-poster {
      width: 100%;
      border-radius: var(--radius);
      margin-bottom: 24px;
      /* 确保图片加载失败时显示提示 */
      object-fit: contain;
      min-height: 400px;
    }
    .action-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<!-- 封面页 -->
<div class="page active" id="pageCover">
  <div class="cover">
    <div class="cover-logo">WZTI</div>
    <h1 class="cover-title">WZTI性格测试</h1>
    <button class="btn" id="startBtn">开始测试</button>
  </div>
</div>

<!-- 答题页 -->
<div class="page" id="pageQuiz">
  <div class="quiz-header">
    <button class="nav-btn" id="prevBtn">上一题</button>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <span id="progressText">0/15</span>
  </div>
  <div class="question" id="questionText"></div>
  <div class="options" id="optionsBox"></div>
</div>

<!-- 结果页 -->
<div class="page" id="pageResult">
  <div class="result">
    <img id="posterImg" class="result-poster" alt="人格海报" onerror="this.src='https://picsum.photos/600/800?random='+Math.random()">
    <div class="action-row">
      <button class="btn" id="restartBtn">重新测试</button>
    </div>
  </div>
</div>

<script>
  // 15道测试题
  const questions = [
    { q: "周末朋友临时喊你出门聚会，但你已经在家躺平了，你会：", o: ["A. 秒回“好耶！马上到！”，光速化妆出门", "B. 假装没看见，等过了两小时回“刚在睡觉”", "C. 理性分析：“出门成本太高，不如点外卖？”", "D. 回：“去哪家？人多吗？有我不认识的吗？”"] },
    { q: "聚会合照时，摄影师喊“三二一”，你会：", o: ["A. 冲到C位，摆出最夸张的Pose", "B. 躲在最后一排，只露出一双眼睛", "C. 指挥大家：“那个谁，头发乱了下，重拍！”", "D. 微笑保持僵硬，心里默念“快点结束”"] },
    { q: "朋友在群里发了一个很冷的笑话，你会：", o: ["A. 发一堆“哈哈哈哈”表情包捧场", "B. 已读不回，假装没看见", "C. 科普：“这个梗是2018年的，过时了。”", "D. 回一个礼貌的“微笑”表情"] },
    { q: "约好12点吃饭，朋友迟到了半小时，你会：", o: ["A. 疯狂发消息：“到了吗？饿死了！”", "B. 自己先点菜，吃饱了再说", "C. 默默计算迟到时间，准备让他请喝奶茶", "D. 站在门口发呆，像尊雕塑一样等"] },
    { q: "看到朋友圈有人发“凡尔赛”文案，你会：", o: ["A. 立刻点赞评论：“富婆求带！”", "B. 心里翻白眼，划走不看", "C. 截图发给小群：“大家快看，他又开始了。”", "D. 认真分析：“这图P得有点假。”"] },
    { q: "朋友失恋了找你哭诉，你会：", o: ["A. 比TA还激动：“走！喝酒去！骂死那个渣男！”", "B. 递纸巾，静静听TA说，给足情绪价值", "C. 理性分析：“分得好，从沉没成本角度看是止损。”", "D. 尴尬地玩手机，不知道该说什么"] },
    { q: "出去旅游做攻略，你的角色通常是：", o: ["A. “我都行，听你们的。”", "B. “我想去这里！全都要去！”", "C. “大家把身份证发我，票我买好了。”", "D. “随便，只要别让我走路就行。”"] },
    { q: "在KTV里，麦霸一直霸占麦克风，你会：", o: ["A. 抢过麦克风，唱得比他更大声", "B. 缩在角落吃果盘", "C. 切歌：“这首太老了，换流行的。”", "D. 默默玩手机，等大家不唱了再点"] },
    { q: "朋友找你借钱（小额），你会：", o: ["A. “转过去了！不用还了，请我吃饭就行。”", "B. “我也没钱……”", "C. “打欠条吗？什么时候还？”", "D. 假装没看见消息"] },
    { q: "遇到特别自来熟的陌生人，你会：", o: ["A. 立刻加入，聊得像兄弟", "B. 尴尬笑，身体后退", "C. 礼貌微笑，找借口溜走", "D. 面无表情，沉默应对"] },
    { q: "打游戏连跪五把，队友还在送，你会：", o: ["A. 开麦沟通", "B. 默默关声音", "C. 记录ID准备举报", "D. 退出游戏冷静"] },
    { q: "朋友发小作文倾诉，你会：", o: ["A. 秒回几百字陪哭", "B. 回表情包抱抱", "C. 分析逻辑给建议", "D. 看开头回嗯嗯"] },
    { q: "网红店排队两小时，你会：", o: ["A. 排！为了拍照必须排", "B. 太累了换一家", "C. 计算成本觉得不划算", "D. 你们排，我坐着等"] },
    { q: "亲戚催婚/问工资，你会：", o: ["A. 反客为主提问", "B. 糊弄糊弄", "C. 用法律/道理拒绝", "D. 低头玩手机不说话"] },
    { q: "看到朋友圈P图过度自拍，你会：", o: ["A. 美女贴贴！", "B. 这是谁？认不出", "C. 找P图痕迹", "D. 直接划过"] }
  ];

  // ✅ 本地图片路径（和html文件同文件夹）
  const posters = [
    "1.png",  // 元流之子
    "2.png",  // 东方曜
    "3.png",  // 伽罗
    "4.png",  // 花木兰
    "5.png",  // 铠
    "6.png",  // 冷春
    "7.png",  // 鲁班大师
    "8.png",  // 蒙犽
    "9.png",  // 孙膑
    "10.png", // 王昭君
    "11.png"  // 西施
  ];

  let current = 0;
  let answers = [];

  // 切换页面
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // 渲染题目
  function renderQuiz() {
    const q = questions[current];
    document.getElementById('questionText').innerText = `${current + 1}. ${q.q}`;
    const box = document.getElementById('optionsBox');
    box.innerHTML = '';
    q.o.forEach((opt, i) => {
      const div = document.createElement('div');
      div.className = 'option';
      div.innerText = opt;
      div.onclick = () => {
        answers[current] = i;
        if (current < questions.length - 1) {
          current++;
          renderQuiz();
          updateProgress();
        } else {
          showResult();
        }
      };
      box.appendChild(div);
    });
    updateProgress();
  }

  // 进度条更新
  function updateProgress() {
    const per = ((current + 1) / questions.length) * 100;
    document.getElementById('progressBar').style.width = per + '%';
    document.getElementById('progressText').innerText = `${current + 1}/${questions.length}`;
  }

  // 稳定哈希算法：同样答案固定结果
  function getStableIndex() {
    let hash = 0;
    answers.forEach(v => { hash = (hash * 13 + v) % 9999; });
    return hash % 11;
  }

  // 展示结果
  function showResult() {
    const idx = getStableIndex();
    document.getElementById('posterImg').src = posters[idx];
    showPage('pageResult');
  }

  // 事件绑定
  document.getElementById('startBtn').onclick = () => {
    current = 0;
    answers = [];
    showPage('pageQuiz');
    renderQuiz();
  };

  document.getElementById('prevBtn').onclick = () => {
    if (current > 0) {
      current--;
      renderQuiz();
    }
  };

  document.getElementById('restartBtn').onclick = () => {
    showPage('pageCover');
  };
</script>
</body>
</html>
